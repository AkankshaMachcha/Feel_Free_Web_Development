<!doctype html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">

    <title>login form</title>
    <style>
        .container-sm {
            margin-top: 15px;
            border: 2px black;
            margin-bottom: 50px;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);

        }
        #signin{
            text-decoration: none;
            color: black;
            margin-left: -20px;
        }
        #forget{
            float: right;
            color: black;
            text-decoration: none;
        }
    
         h1{
             font-weight: 1000;
             margin-top: 25px;
             text-align: center;
             font-family: 'Courier New', Courier, monospace;
        }   
        #member{
            text-align: right;
        }
        
    </style>
</head>

<body>
   <h1>Feel Free</h1>
    
<div class="container-sm" style="height: 75%; width:75%">
        <div class="row">
            <div class="col-md-6">

                <img class="p-4 img-fluid" src="formimage.jpg">

            </div>
                 <div class="col-md-6">

    <h2 style="margin-top: 20px;text-align: center;font-family: 'Courier New', Courier, monospace;">LOG IN</h2>
                <form style="margin-top: 30px;">
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Password</label>
                        <input type="password" class="form-control" id="exampleInputPassword1">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                    <div class="mb-3 form-check" style="margin-top: 20px;">
                        <input type="checkbox" class="form-check-input" id="exampleCheck1">
                        <label class="form-check-label" for="exampleCheck1">Remember me</label>
                        <a href="Hallticket.html" id="forget">Forgot Password</a>
                    </div>
                    <div class="row">
                        <div class="col-md-7">
                            <p id="member">Not a Member?</p>
                        </div>
                        <div class="col-md-5">
                            <a href="Signin.html" id="signin">Sign in</a>
                        </div>
                    </div>   
            </div>
            <br>
            </form>

        </div>
    </div>
    </div>
</body>

</html>
