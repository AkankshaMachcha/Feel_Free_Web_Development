<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Home page</title>
    <style>
        .container-sm{
            margin-top: 15px;
            border: 2px black;
            margin-bottom: 50px;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2),0 6px 20px 0 rgba(0,0,0,0.19);
        }
        h1{
          font-weight: 1000;
             margin-top: 25px;
             text-align: center;
             font-family: 'Courier New', Courier, monospace;
        }
      h2 {
            text-align: center;
            font-family:'Courier New', Courier, monospace;
        }
      #form-Content{
              font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

       
    </style>
  </head>
  <body>
    <h1>Feel-Free</h1>
    <div class="container-sm" style="height:75%; width:75%;" >
        <div class="row">
            <div class="col-md-6">
               <img class="mx-auto d-block" src="formimage.jpg" style="width:80%; margin-top: 80px;" alt="">
            </div>
            <div class="col-md-6" style="margin-top: 20px;">
                <p class="text-center"><h2>Sign in</h2></p>
                <form class="row g-3">
                    <div class="col-md-6">
                  
                      <label for="inputEmail4" class="form-label" id="form-Content">Email</label>
                      <input type="email" class="form-control" id="inputEmail4">
                    </div>
                    <div class="col-md-6">
                      <label for="inputPassword4" class="form-label" id="form-Content">Password</label>
                      <input type="password" class="form-control" id="inputPassword4">
                    </div>
                    <div class="col-12">
                      <label for="inputAddress" class="form-label" id="form-Content">Address</label>
                      <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
                    </div>
                   
                    <div class="col-md-6">
                      <label for="inputCity" class="form-label" id="form-Content">City</label>
                      <input type="text" class="form-control" id="inputCity">
                    </div>
                    <div class="col-md-4">
                      <label for="inputState" class="form-label"id="form-Content">State</label>
                      <select id="inputState" class="form-select">
                        <option selected>Choose...</option>
                        <option>...</option>
                      </select>
                    </div>
                    <div class="col-md-2">
                      <label for="inputZip" class="form-label">Zip</label>
                      <input type="text" class="form-control" id="inputZip">
                    </div>
                    <div class="col-12">
                      <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="gridCheck">
                        <label class="form-check-label" for="gridCheck" id="form-Content">
                          Check me out
                        </label>
                      </div>
                    </div>
                    <div class="col-12" style="margin-bottom:30px;">
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" type="submit">Sign in</button>
                        </div>
                        <div class="form-text" style="text-align: center;">done sign in? Login </div>
                  </form>
            </div>
        </div>
    </div>


    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
  </body>
</html>
